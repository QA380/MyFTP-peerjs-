version: '3.8'

services:
  pyfiletransfer:
    build: .
    container_name: pyfiletransfer
    ports:
      - "8080:8080"
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped
    networks:
      - filetransfer-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Optional: Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: pyfiletransfer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - pyfiletransfer
    restart: unless-stopped
    networks:
      - filetransfer-net
    profiles:
      - with-nginx

networks:
  filetransfer-net:
    driver: bridge
